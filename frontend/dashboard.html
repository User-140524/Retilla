<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rentilla Dashboard</title>
  <style>

    body {
      font-family: Arial, sans-serif;
      background: #f5f3f0;
      margin: 0;
      padding: 2rem;
      color: #2c2420;
      visibility: hidden;
    }
    .dashboard {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 8px;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }
    .card {
      background: #f9f8f7;
      padding: 1rem;
      border-radius: 8px;
      border-left: 4px solid #6ba85a;
    }
    button {
      background: #6ba85a;
      color: white;
      border: none;
      padding: 0.8rem 1.2rem;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 1rem;
    }
    .dashboard-nav {
  max-width: 900px;
  margin: 0 auto 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.dashboard-home-btn,
.dashboard-logout-btn {
  display: inline-block;
  padding: 0.7rem 1.1rem;
  background: white;
  color: #2c2420;
  text-decoration: none;
  border: 1px solid rgba(168,154,143,0.3);
  border-radius: 8px;
  font-weight: 600;
  transition: 0.25s ease;
  cursor: pointer;
}

.dashboard-home-btn:hover,
.dashboard-logout-btn:hover {
  border-color: #6ba85a;
  color: #6ba85a;
  background: rgba(107,168,90,0.04);
}
    
  </style>
</head>
<body>
  <div class="dashboard-nav">
  <a href="index.html" class="dashboard-home-btn">Home</a>
  <button id="logoutBtn" class="dashboard-logout-btn">Logout</button>
</div>
  <div class="dashboard">
    <h1>Your Rentilla Dashboard</h1>
    <p id="userInfo">Loading user info...</p>

    <button id="logoutBtn">Logout</button>

    <div class="card-grid">
      <div class="card">
        <h3>Current Rentals</h3>
        <p>No active rentals yet.</p>
      </div>
      <div class="card">
        <h3>Rental History</h3>
        <p>Your previous rentals will appear here.</p>
      </div>
      <div class="card">
        <h3>Pending Requests</h3>
        <p>Your pending approvals will appear here.</p>
      </div>
    </div>
  </div>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
